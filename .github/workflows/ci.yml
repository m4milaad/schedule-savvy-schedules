name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  frontend:
    name: Frontend Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit --project tsconfig.app.json

      - name: Lint
        run: npm run lint

      - name: Run frontend tests with coverage
        run: npx vitest run --coverage

  backend:
    name: Backend Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Ruff
        run: ruff check .

      - name: Mypy
        run: mypy . --config-file pyproject.toml

      - name: Pytest
        run: pytest tests -v --cov=. --cov-report=term-missing

# Note:
# Configure GitHub branch protection on `main` with required status checks
# so deployments (e.g., Vercel) are gated by this workflow.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend — lint, type-check, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: TypeScript type-check
        run: npx tsc --noEmit --project tsconfig.app.json

      - name: ESLint
        run: npm run lint

      - name: Vitest
        run: npx vitest run --coverage

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: coverage/

  python:
    name: Python — lint, test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Pytest
        run: python -m pytest tests/ -v --cov=. --cov-report=xml

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-coverage
          path: backend/coverage.xml

# NOTE: To gate Vercel deploys on CI passing, add these jobs as
# "Required status checks" in GitHub → Settings → Branches → main → Protection rules.
