services:
  - type: web
    name: cuk-rag-backend
    env: python
    plan: free
    rootDir: .
    buildCommand: pip install -r backend/requirements.txt && python scripts/ingest.py
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT --workers 1
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DEMO_MODE
        value: "true"
      - key: LOG_LEVEL
        value: "INFO"
